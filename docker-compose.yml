version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fgaesthetic-backend
    ports:
      - "5000:5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRATION_HOURS=24
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - ./backend:/app
      - /app/venv
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: fgaesthetic-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
