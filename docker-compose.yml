# ================================
# FG Aesthetic NFC Loyalty System
# Docker Compose Configuration
# ================================
#
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml up -d
#
# Environment variables should be set in .env file at project root

services:
  # ==================== Backend API ====================
  backend:
    build: ./backend
    container_name: fgaesthetic-backend
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - FRONTEND_URL=http://localhost:5173
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Frontend App ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: fgaesthetic-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - vite_cache:/vite-cache
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=300
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_JWT_SECRET=${VITE_JWT_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5173 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  frontend_node_modules:
  vite_cache:
